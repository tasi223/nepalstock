<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Correlation Signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fff8f1;
      --card:#ffffff;
      --text:#151733;
      --muted:#6a6f8d;
      --line:#ece3d8;
      --accent1:#ffb800;
      --accent2:#ff5e3a;
      --accent3:#11cfa5;
      --accent4:#3197ff;
      --shadow: 0 18px 50px rgba(46, 36, 23, .08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,184,0,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(255,94,58,.08), transparent 28%),
        linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
      color:var(--text);
    }
    .wrap{
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 22px 40px;
    }
    .hero h1{
      margin:0;
      font-size: clamp(2.7rem, 6vw, 5rem);
      line-height: .95;
      letter-spacing:-.05em;
      font-weight:900;
    }
    .hero h1 .accent{
      background: linear-gradient(90deg, var(--accent2), #ff7d2f, #ff4f67);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .hero p{
      margin: 18px 0 0;
      font-size: 1.08rem;
      color: #223;
      opacity:.9;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-top:18px;
    }
    .refresh-btn{
      border:0;
      background: linear-gradient(135deg, var(--accent2), #ff7a45);
      color:#fff;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight:700;
      cursor:pointer;
      box-shadow: 0 12px 26px rgba(255,94,58,.25);
    }
    .stats{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:18px;
      margin-top: 44px;
    }
    .stat{
      position:relative;
      background: rgba(255,255,255,.95);
      border:1px solid rgba(0,0,0,.06);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px 22px 20px;
      min-height: 104px;
      overflow:hidden;
    }
    .stat:before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:4px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent4));
    }
    .stat .label{
      text-transform:uppercase;
      letter-spacing:.35em;
      font-size:.72rem;
      color:#7d7f9d;
      font-weight:700;
    }
    .stat .value{
      margin-top:14px;
      font-size: clamp(1.5rem, 2.8vw, 2.2rem);
      font-weight:900;
      color:var(--text);
    }
    .tabs{
      display:flex;
      gap:12px;
      margin: 30px 0 16px;
      flex-wrap:wrap;
    }
    .tab-btn{
      border:1px solid #ffd9c8;
      background:#fff7f2;
      color:#ff5a2f;
      padding:12px 18px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
    }
    .tab-btn.active{
      background:linear-gradient(135deg, var(--accent2), #ff7a45);
      color:#fff;
      border-color:transparent;
    }
    .section-title{
      margin: 10px 0 14px;
      font-size: .86rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:#697096;
      font-weight:800;
    }
    .table-card{
      background: rgba(255,255,255,.96);
      border:1px solid rgba(0,0,0,.06);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .table-wrap{
      overflow:auto;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width: 980px;
    }
    thead th{
      text-align:left;
      font-size:.78rem;
      letter-spacing:.22em;
      color:#8a8fa8;
      text-transform:uppercase;
      padding: 18px 22px;
      background:#fff9f2;
      border-bottom:1px solid #efe5da;
    }
    tbody td{
      padding: 18px 22px;
      border-bottom:1px solid #f0ece6;
      vertical-align:middle;
    }
    tbody tr:hover{
      background:#fffdf8;
    }
    .rank{
      width:50px;
      font-weight:700;
      color:#656d8b;
    }
    .symbol{
      font-size: 1.05rem;
      font-weight: 800;
      color:#161c39;
    }
    .subindex-name{
      font-weight:700;
      color:#4b5b8a;
    }
    .price-pill{
      display:inline-block;
      padding: 8px 14px;
      border-radius: 12px;
      border:1px solid #ffd48b;
      background: #fff6e6;
      color:#d55b00;
      font-weight:800;
    }
    .corr-row{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .bar{
      width: 120px;
      height: 8px;
      border-radius: 999px;
      background: #e9eef8;
      overflow:hidden;
      flex:0 0 auto;
    }
    .bar > span{
      display:block;
      height:100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent3), var(--accent4));
    }
    .corr-value{
      font-weight:900;
      color:#ff4157;
      min-width: 70px;
      text-align:left;
    }
    .chart-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 10px 16px;
      border-radius: 12px;
      border:1px solid #ffd2bc;
      color:#ff5a2f;
      text-decoration:none;
      font-weight:800;
      background:#fff8f3;
    }
    .status{ font-weight:700; }
    .error{ color:#d64545; font-weight:700; }

    @media (max-width: 900px){
      .stats{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 600px){
      .stats{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Correlation <span class="accent">Signals</span></h1>
      <p>Stocks with ≥90% correlation to NEPSE Index and sector SubIndex</p>
    </section>

    <div class="topbar">
      <div class="status" id="statusText">Loading data...</div>
      <button class="refresh-btn" onclick="loadSignals(true)">Refresh</button>
    </div>

    <section class="stats">
      <div class="stat">
        <div class="label">Date</div>
        <div class="value" id="dateValue">—</div>
      </div>
      <div class="stat">
        <div class="label">Main Index Stocks</div>
        <div class="value" id="mainCountValue">0</div>
      </div>
      <div class="stat">
        <div class="label">SubIndex Stocks</div>
        <div class="value" id="subCountValue">0</div>
      </div>
      <div class="stat">
        <div class="label">Threshold</div>
        <div class="value" id="thresholdValue">≥ 90%</div>
      </div>
    </section>

    <div class="tabs">
      <button class="tab-btn active" id="tabMain" onclick="switchTab('main')">NEPSE Index Correlation</button>
      <button class="tab-btn" id="tabSub" onclick="switchTab('sub')">SubIndex Correlation</button>
    </div>

    <div class="section-title" id="listTitle">Loading...</div>

    <section class="table-card">
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="padding:24px;color:#7a8099;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9SCmJXU2lhMAL-xHzhjfAjDXla7LkPULLebrlvuErMd8_tHzGHB2IK8neKSigNK5l/exec";
    const CACHE_KEY = "corrSignalsBoth_v1";
    const CACHE_TTL = 5 * 60 * 1000;

    let appData = null;
    let currentTab = "main";

    const statusText = document.getElementById("statusText");
    const dateValue = document.getElementById("dateValue");
    const mainCountValue = document.getElementById("mainCountValue");
    const subCountValue = document.getElementById("subCountValue");
    const thresholdValue = document.getElementById("thresholdValue");
    const listTitle = document.getElementById("listTitle");
    const tbody = document.getElementById("tbody");
    const tableHead = document.getElementById("tableHead");

    function fmtClose(v) {
      if (v === null || v === undefined || v === "") return "—";
      const n = Number(String(v).replace(/,/g, ""));
      if (Number.isFinite(n)) {
        return "Rs " + n.toLocaleString("en-US", { minimumFractionDigits: 1, maximumFractionDigits: 2 });
      }
      return String(v);
    }

    function renderTable() {
      if (!appData) return;

      const threshold = appData.threshold || 90;
      const items = currentTab === "main" ? (appData.mainIndexItems || []) : (appData.subIndexItems || []);

      if (currentTab === "main") {
        tableHead.innerHTML = `
          <tr>
            <th>#</th>
            <th>Symbol</th>
            <th>Close Price</th>
            <th>Correlation</th>
            <th>Chart</th>
          </tr>
        `;
        listTitle.textContent = items.length + " stocks with ≥" + threshold + "% correlation vs NEPSE Index";
      } else {
        tableHead.innerHTML = `
          <tr>
            <th>#</th>
            <th>Symbol</th>
            <th>SubIndex</th>
            <th>Close Price</th>
            <th>Correlation</th>
            <th>Chart</th>
          </tr>
        `;
        listTitle.textContent = items.length + " stocks with ≥" + threshold + "% correlation vs their SubIndex";
      }

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="padding:24px;color:#7a8099;">No stocks found above threshold right now.</td></tr>';
        return;
      }

      tbody.innerHTML = items.map((item, i) => {
        const width = Math.max(6, Math.min(100, item.correlation));
        if (currentTab === "main") {
          return `
            <tr>
              <td class="rank">${i + 1}</td>
              <td class="symbol">${item.symbol}</td>
              <td><span class="price-pill">${fmtClose(item.close)}</span></td>
              <td>
                <div class="corr-row">
                  <div class="bar"><span style="width:${width}%;"></span></div>
                  <div class="corr-value">${item.correlation.toFixed(2)}%</div>
                </div>
              </td>
              <td><a class="chart-btn" href="${item.chartUrl}" target="_blank">View ↗</a></td>
            </tr>
          `;
        } else {
          return `
            <tr>
              <td class="rank">${i + 1}</td>
              <td class="symbol">${item.symbol}</td>
              <td class="subindex-name">${item.subIndex || "-"}</td>
              <td><span class="price-pill">${fmtClose(item.close)}</span></td>
              <td>
                <div class="corr-row">
                  <div class="bar"><span style="width:${width}%;"></span></div>
                  <div class="corr-value">${item.correlation.toFixed(2)}%</div>
                </div>
              </td>
              <td><a class="chart-btn" href="${item.chartUrl}" target="_blank">View ↗</a></td>
            </tr>
          `;
        }
      }).join("");
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabMain").classList.toggle("active", tab === "main");
      document.getElementById("tabSub").classList.toggle("active", tab === "sub");
      renderTable();
    }

    function render(payload) {
      appData = payload;

      dateValue.textContent = payload.date || "—";
      mainCountValue.textContent = payload.mainIndexCount || 0;
      subCountValue.textContent = payload.subIndexCount || 0;
      thresholdValue.textContent = "≥ " + (payload.threshold || 90) + "%";

      renderTable();
    }

    function setError(msg) {
      statusText.className = "status error";
      statusText.textContent = msg;
      tbody.innerHTML = '<tr><td colspan="6" style="padding:24px;color:#d64545;">Could not load data.</td></tr>';
    }

    function loadSignals(forceRefresh = false) {
      statusText.className = "status";
      statusText.textContent = "Loading data...";

      if (!forceRefresh) {
        try {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
          if (cached && Date.now() - cached.time < CACHE_TTL) {
            render(cached.data);
            statusText.textContent = "Loaded from cache";
            return;
          }
        } catch (e) {}
      }

      fetch(API_URL, {
        method: "GET",
        cache: "no-store"
      })
      .then(response => {
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.json();
      })
      .then(data => {
        console.log("API DATA:", data);
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          time: Date.now(),
          data: data
        }));
        render(data);
        statusText.textContent = "Live data loaded successfully";
      })
      .catch(err => {
        console.error("FETCH ERROR:", err);
        setError("API load failed. Check Apps Script URL / deployment.");
      });
    }

    loadSignals();
  </script>
</body>
</html>
